<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GTVMeN9QM3eB8z13FBvP8m7+J6D0t2MqfITI3C2EYhQ/eLVuDVKnGiB0JeX3McXA" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Tip Calculator</title>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6">
                <div class="card shadow-sm border-0 overflow-hidden">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
                            <h1 class="h3 mb-0">Tip Calculator</h1>
                            <button id="themeToggle" type="button" class="btn btn-icon btn-outline-secondary" aria-label="Toggle light/dark mode">
                                <span class="theme-icon">🌙</span>
                            </button>
                        </div>

                        <form id="form" novalidate>
                            <div class="row gx-3 mb-3 align-items-end">
                                <div class="col-12 col-md-6">
                                    <label class="form-label">Bill Amount</label>
                                    <input class="form-control form-control-lg" type="number" id="bill" min="0" step="0.01" placeholder="0.00">
                                    <div id="billError" class="invalid-feedback"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label">No. of People</label>
                                    <input class="form-control form-control-lg" type="number" id="people" min="1" placeholder="1">
                                    <div id="peopleError" class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tip Percentage</label>
                                <div class="d-flex flex-wrap gap-2 tip-buttons">
                                    <button type="button" data-tip="10" class="btn btn-outline-primary flex-fill">10%</button>
                                    <button type="button" data-tip="15" class="btn btn-outline-primary flex-fill">15%</button>
                                    <button type="button" data-tip="20" class="btn btn-outline-primary flex-fill">20%</button>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Custom Tip %</label>
                                <input class="form-control form-control-lg" type="number" id="custom" min="0" step="0.01" placeholder="Custom tip">
                                <div id="customError" class="invalid-feedback"></div>
                            </div>

                            <div class="d-flex justify-content-center">
                                <button type="submit" class="btn btn-primary btn-lg px-5 mx-auto">Calculate</button>
                            </div>
                        </form>

                        <div class="results mt-4 p-4 rounded-4 border bg-white">
                            <div class="row text-center gx-3">
                                <div class="col-12 col-md-4 mb-3 mb-md-0">
                                    <p class="text-muted mb-1">Total Tip</p>
                                    <p class="fs-4 fw-semibold mb-0">$<span id="tipResult">0.00</span></p>
                                </div>
                                <div class="col-12 col-md-4 mb-3 mb-md-0">
                                    <p class="text-muted mb-1">Total Bill</p>
                                    <p class="fs-4 fw-semibold mb-0">$<span id="totalResult">0.00</span></p>
                                </div>
                                <div class="col-12 col-md-4">
                                    <p class="text-muted mb-1">Share Per Person</p>
                                    <p class="fs-4 fw-semibold mb-0">$<span id="shareResult">0.00</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
